<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFC15A"/><stop offset=".55" stop-color="#FF6F91"/><stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>
    <radialGradient id="face" cx=".5" cy=".42" r=".62">
      <stop offset="0" stop-color="#3A2B4A"/><stop offset="1" stop-color="#0E0E13"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#14141A"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#2A2A34" stroke-width="4"/>

  <!-- bands: width 108 ~= 0.46 x case diameter (Pixel Watch 4: ~20mm band on 41mm case) -->
