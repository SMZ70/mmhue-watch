  <rect x="202" y="404" width="108" height="16" rx="8" fill="#4E4E5B"/>

  <!-- round domed watch body -->
  <circle cx="256" cy="256" r="116" fill="#0E0E13"/>
  <circle cx="256" cy="256" r="116" fill="none" stroke="url(#g)" stroke-width="11"/>
  <circle cx="256" cy="256" r="104" fill="url(#face)"/>

  <!-- crown only (grey button removed) -->
  <rect x="368" y="240" width="18" height="30" rx="9" fill="url(#g)"/>

  <!-- bulb glyph -->
